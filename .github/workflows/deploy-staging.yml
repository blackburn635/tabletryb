name: Deploy — Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build:shared

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-2

      - name: CDK Deploy to Staging
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CHARGEBEE_SITE: ${{ secrets.CHARGEBEE_SITE }}
          CHARGEBEE_API_KEY: ${{ secrets.CHARGEBEE_API_KEY }}
          CHARGEBEE_WEBHOOK_SECRET: ${{ secrets.CHARGEBEE_WEBHOOK_SECRET }}
        working-directory: infrastructure
        run: npx cdk deploy TableTryb-staging --require-approval never

      - name: Print outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name TableTryb-staging \
            --query "Stacks[0].Outputs" \
            --output table
